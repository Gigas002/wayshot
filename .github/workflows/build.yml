name: Build

on: [push, pull_request]

permissions:
    contents: read
    actions: write

env:
    CARGO_TERM_COLOR: always

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: all-features
                      cargo_args: --workspace --release --all-features --all-targets
                    - name: default
                      cargo_args: --workspace --release --all-targets
                    - name: minimal
                      cargo_args: --workspace --release --no-default-features --all-targets

        name: ${{ matrix.name }}
        runs-on: ubuntu-latest
        container:
            image: archlinux:latest

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - uses: dtolnay/rust-toolchain@stable

            - name: Build Cache
              uses: Swatinem/rust-cache@v2

            - name: Install wayland dependencies
              run: |
                  pacman -Syu --noconfirm egl-wayland egl-gbm wayland base-devel mesa pango cairo

            - name: Build (${{ matrix.name }})
              run: cargo build ${{ matrix.cargo_args }}
